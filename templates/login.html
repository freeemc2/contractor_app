<!DOCTYPE html>
<html><head><title>Login</title></head>
<body style="font-family: Arial; padding: 50px;">
<h1>Login</h1>
<form id="loginForm">
<input type="email" name="email" placeholder="Email" required style="display: block; margin: 10px 0; padding: 10px; width: 300px;"><br>
<input type="password" name="password" placeholder="Password" required style="display: block; margin: 10px 0; padding: 10px; width: 300px;"><br>
<button type="submit" style="padding: 10px 20px; background: blue; color: white; border: none;">Login</button>
</form>
<script>
document.getElementById('loginForm').onsubmit = async (e) => {
  e.preventDefault();
  const data = {email: e.target.email.value, password: e.target.password.value};
  const res = await fetch('/login', {method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(data)});
  const result = await res.json();
  if (result.success) window.location = result.redirect;
  else alert(result.error || 'Login failed');
};
</script>
</body>
</html>
