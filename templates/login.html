<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login — Contractor Engine</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0f1117;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .card {
    background: #1a1d27;
    border: 1px solid #2a2d3a;
    border-radius: 12px;
    padding: 48px 40px;
    width: 100%;
    max-width: 400px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  }
  .logo { text-align: center; margin-bottom: 32px; }
  .logo-icon {
    width: 52px; height: 52px;
    background: linear-gradient(135deg, #f97316, #ea580c);
    border-radius: 12px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
    margin-bottom: 12px;
  }
  .logo h1 { color: #fff; font-size: 20px; font-weight: 700; }
  .logo p { color: #6b7280; font-size: 13px; margin-top: 4px; }
  label { display: block; color: #9ca3af; font-size: 13px; font-weight: 500; margin-bottom: 6px; }
  input[type=email], input[type=password] {
    width: 100%;
    padding: 12px 14px;
    background: #0f1117;
    border: 1px solid #2a2d3a;
    border-radius: 8px;
    color: #fff;
    font-size: 15px;
    margin-bottom: 18px;
    outline: none;
    transition: border-color 0.2s;
  }
  input:focus { border-color: #f97316; }
  button {
    width: 100%;
    padding: 13px;
    background: linear-gradient(135deg, #f97316, #ea580c);
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 4px;
    transition: opacity 0.2s;
  }
  button:hover { opacity: 0.9; }
  .error {
    background: #3f1212;
    border: 1px solid #7f1d1d;
    color: #fca5a5;
    padding: 10px 14px;
    border-radius: 8px;
    font-size: 13px;
    margin-bottom: 16px;
    display: none;
  }
  .divider { text-align: center; margin: 24px 0 16px; color: #374151; font-size: 13px; }
  .contractor-link {
    display: block;
    text-align: center;
    color: #6b7280;
    font-size: 13px;
    text-decoration: none;
    padding: 10px;
    border: 1px solid #2a2d3a;
    border-radius: 8px;
    transition: border-color 0.2s, color 0.2s;
  }
  .contractor-link:hover { border-color: #4b5563; color: #d1d5db; }
  .badge {
    display: inline-block;
    background: #14532d;
    color: #86efac;
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 20px;
    margin-left: 8px;
  }
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-icon">&#9889;</div>
    <h1>Admin Console <span class="badge">LIVE</span></h1>
    <p>AI Lead Engine &mdash; Contractor Vertical</p>
  </div>
  <div class="error" id="err"></div>
  <form id="loginForm">
    <label>Email</label>
    <input type="email" id="email" placeholder="admin@contractor.app" required autofocus>
    <label>Password</label>
    <input type="password" id="password" placeholder="&bull;&bull;&bull;&bull;&bull;&bull;&bull;&bull;" required>
    <button type="submit" id="btn">Sign In</button>
  </form>
  <div class="divider">or</div>
  <a href="/contractor/login" class="contractor-link">&#128296; Contractor Login</a>
</div>
<script>
document.getElementById('loginForm').onsubmit = async (e) => {
  e.preventDefault();
  const btn = document.getElementById('btn');
  const err = document.getElementById('err');
  btn.textContent = 'Signing in...';
  btn.disabled = true;
  err.style.display = 'none';
  try {
    const res = await fetch('/login', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        email: document.getElementById('email').value,
        password: document.getElementById('password').value
      })
    });
    const data = await res.json();
    if (data.success) {
      window.location = data.redirect || '/dashboard';
    } else {
      err.textContent = data.error || 'Invalid credentials';
      err.style.display = 'block';
      btn.textContent = 'Sign In';
      btn.disabled = false;
    }
  } catch(ex) {
    err.textContent = 'Connection error';
    err.style.display = 'block';
    btn.textContent = 'Sign In';
    btn.disabled = false;
  }
};
</script>
</body>
</html>
