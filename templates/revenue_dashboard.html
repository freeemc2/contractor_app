<!DOCTYPE html><html><head><title>Revenue</title><style>body{font-family:Arial;background:#f5f5f5;margin:0}.hdr{background:linear-gradient(135deg,#667eea,#764ba2);color:white;padding:20px 40px}.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:20px;padding:20px}.card{background:white;padding:25px;border-radius:10px}.val{font-size:36px;font-weight:bold;color:#667eea}</style></head><body><div class="hdr"><h1>💰 Revenue</h1><a href="/dashboard" style="color:white">← Back</a></div><div class="stats"><div class="card"><div class="val" id="l">0</div><div>Total Leads</div></div><div class="card"><div class="val" id="c">0</div><div>Contractors</div></div><div class="card"><div class="val" id="d">0</div><div>Deals</div></div><div class="card"><div class="val" id="r">$0</div><div>Revenue</div></div></div><script>fetch("/api/revenue").then(r=>r.json()).then(d=>{document.getElementById("l").textContent=d.total_leads||0;document.getElementById("c").textContent=d.active_contractors||0;document.getElementById("d").textContent=d.closed_deals||0;document.getElementById("r").textContent="$"+(d.revenue||0).toFixed(2)})</script></body></html>
