<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contractor Login</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #1e3a5f 0%, #0f2744 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .card {
    background: #fff;
    border-radius: 14px;
    padding: 48px 40px;
    width: 100%;
    max-width: 420px;
    box-shadow: 0 24px 80px rgba(0,0,0,0.4);
  }
  .logo { text-align: center; margin-bottom: 32px; }
  .logo-icon {
    width: 56px; height: 56px;
    background: linear-gradient(135deg, #1e3a5f, #2563eb);
    border-radius: 14px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 26px;
    margin-bottom: 14px;
  }
  .logo h1 { color: #111; font-size: 22px; font-weight: 700; }
  .logo p { color: #6b7280; font-size: 14px; margin-top: 5px; }
  label { display: block; color: #374151; font-size: 13px; font-weight: 600; margin-bottom: 6px; }
  input[type=email], input[type=password] {
    width: 100%;
    padding: 12px 14px;
    border: 2px solid #e5e7eb;
    border-radius: 8px;
    color: #111;
    font-size: 15px;
    margin-bottom: 18px;
    outline: none;
    transition: border-color 0.2s;
  }
  input:focus { border-color: #2563eb; }
  button {
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, #1e3a5f, #2563eb);
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    margin-top: 4px;
    transition: opacity 0.2s;
    letter-spacing: 0.3px;
  }
  button:hover { opacity: 0.9; }
  .error {
    background: #fef2f2;
    border: 1px solid #fecaca;
    color: #dc2626;
    padding: 10px 14px;
    border-radius: 8px;
    font-size: 13px;
    margin-bottom: 16px;
    display: none;
  }
  .footer {
    text-align: center;
    margin-top: 24px;
    padding-top: 20px;
    border-top: 1px solid #f3f4f6;
  }
  .footer a { color: #6b7280; font-size: 13px; text-decoration: none; }
  .footer a:hover { color: #374151; }
  .signup-link {
    display: block;
    text-align: center;
    margin-top: 14px;
    font-size: 13px;
    color: #6b7280;
  }
  .signup-link a { color: #2563eb; font-weight: 600; text-decoration: none; }
.lang-toggle{position:fixed;top:16px;right:16px;display:flex;background:rgba(255,255,255,.1);border-radius:20px;border:1px solid rgba(255,255,255,.2);z-index:100}.lang-btn{padding:6px 14px;font-size:13px;font-weight:700;cursor:pointer;border:none;background:transparent;color:rgba(255,255,255,.6)}.lang-btn.active{background:white;color:#1e3a5f;border-radius:20px}</style>
</head>
<body>
<div class="lang-toggle"><button class="lang-btn active" id="btn-en" onclick="setLang('en')">EN</button><button class="lang-btn" id="btn-es" onclick="setLang('es')">ES</button></div>
<div class="card">
  <div class="logo">
    <div class="logo-icon">&#128296;</div>
    <h1 data-en="Contractor Portal" data-es="Portal del Contratista">Contractor Portal</h1>
    <p data-en="Sign in to view your leads and jobs" data-es="Inicia sesión para ver tus contactos y trabajos">Sign in to view your leads and jobs</p>
  </div>
  <div class="error" id="err"></div>
  <form id="form">
    <label data-en="Email Address" data-es="Correo Electrónico">Email Address</label>
    <input type="email" id="email" placeholder="you@example.com" required autofocus>
    <label data-en="Password" data-es="Contraseña">Password</label>
    <input type="password" id="password" placeholder="&bull;&bull;&bull;&bull;&bull;&bull;&bull;&bull;" required>
    <button type="submit" id="btn">Access My Portal</button>
  </form>
  <div class="signup-link">
    Not a contractor yet? <a href="/register" data-en="Join the network" data-es="Únete a la red">Join the network</a>
  </div>
  <div class="footer">
    <a href="/login">Admin Login</a>
  </div>
</div>
<script>
function setLang(lang){document.querySelectorAll("[data-en]").forEach(el=>{el.textContent=el.getAttribute("data-"+lang);});document.getElementById("btn-en").classList.toggle("active",lang==="en");document.getElementById("btn-es").classList.toggle("active",lang==="es");localStorage.setItem("lang",lang);}const _sl=localStorage.getItem("lang");if(_sl==="es")setLang("es");
document.getElementById('form').onsubmit = async (e) => {
  e.preventDefault();
  const btn = document.getElementById('btn');
  const err = document.getElementById('err');
  btn.textContent = 'Signing in...';
  btn.disabled = true;
  err.style.display = 'none';
  try {
    const res = await fetch('/contractor/login', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        email: document.getElementById('email').value,
        password: document.getElementById('password').value
      })
    });
    const data = await res.json();
    if (data.success) {
      window.location = '/contractor/portal';
    } else {
      err.textContent = data.error || 'Invalid credentials';
      err.style.display = 'block';
      btn.textContent = 'Access My Portal';
      btn.disabled = false;
    }
  } catch(ex) {
    err.textContent = 'Connection error. Please try again.';
    err.style.display = 'block';
    btn.textContent = 'Access My Portal';
    btn.disabled = false;
  }
};
</script>
</body>
</html>
