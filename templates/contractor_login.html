<!DOCTYPE html><html><head><title>Contractor Login</title><style>body{font-family:Arial;background:linear-gradient(135deg,#667eea,#764ba2);min-height:100vh;display:flex;align-items:center;justify-content:center}.box{background:white;padding:40px;border-radius:10px;max-width:400px}input{width:100%;padding:12px;margin:10px 0;border:2px solid #ddd;border-radius:5px}button{width:100%;padding:15px;background:#667eea;color:white;border:none;border-radius:5px;font-weight:bold}</style></head><body><div class="box"><h1>🔨 Contractor Login</h1><form id="f"><input type="email" id="e" placeholder="Email"><input type="password" id="p" placeholder="Password"><button type="submit">Login</button></form></div><script>document.getElementById("f").onsubmit=async(e)=>{e.preventDefault();const r=await fetch("/contractor/login",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({email:document.getElementById("e").value,password:document.getElementById("p").value})});const d=await r.json();d.success?location="/contractor/dashboard":alert("Failed: "+d.error)}</script></body></html>
