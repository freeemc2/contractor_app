<!DOCTYPE html>
<html><head><title>Register</title></head>
<body style="font-family: Arial; padding: 50px;">
<h1>Register</h1>
<form id="regForm">
<input type="email" name="email" placeholder="Email" required style="display: block; margin: 10px 0; padding: 10px; width: 300px;">
<input type="password" name="password" placeholder="Password" required style="display: block; margin: 10px 0; padding: 10px; width: 300px;">
<input type="text" name="company_name" placeholder="Company Name" style="display: block; margin: 10px 0; padding: 10px; width: 300px;">
<input type="text" name="trade" placeholder="Trade (electrician, plumber, etc)" style="display: block; margin: 10px 0; padding: 10px; width: 300px;">
<button type="submit" style="padding: 10px 20px; background: blue; color: white; border: none;">Register</button>
</form>
<script>
document.getElementById('regForm').onsubmit = async (e) => {
  e.preventDefault();
  const formData = new FormData(e.target);
  const data = Object.fromEntries(formData);
  const res = await fetch('/register', {method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(data)});
  const result = await res.json();
  if (result.success) window.location = result.redirect;
  else alert(result.error || 'Registration failed');
};
</script>
</body>
</html>
